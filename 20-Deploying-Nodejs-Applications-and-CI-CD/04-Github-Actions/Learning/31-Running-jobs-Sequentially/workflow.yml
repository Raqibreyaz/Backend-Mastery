name: my first workflow
on: [push,workflow_dispatch]
jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: print working directory
        run: pwd
      - name: list all files
        run: ls -a
      - name: create js file
        run: echo 'console.log("Hello World!")' > app.js
      - name: list all files
        run: ls -a
      - name: run nodejs file
        run: node app.js
  job-2:
    runs-on: ubuntu-latest
    needs: job-1
    steps:
      - name: disk usage
        run: du -h --max-depth=1