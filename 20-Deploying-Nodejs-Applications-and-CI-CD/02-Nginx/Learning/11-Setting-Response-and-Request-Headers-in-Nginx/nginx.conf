# for removing 'Server' header
load_module /usr/lib/nginx/modules/ngx_http_headers_more_filter_module.so;

events {}

user raquib;

worker_processes auto;

http {
    # for removing 'Server' header
    more_clear_headers Server;

    sendfile on;
    server {
        listen 127.0.0.1:80;
        server_name api.local.com;
        server_tokens off; #version
        location /err {
            proxy_pass http://localhost:4000;
            root /home/raquib/Code/Backend-Mastery/texts;
            try_files error.html =404;
        }
        location = / {
            proxy_pass http://localhost:4000;
            add_header hello world; #sending with response
            proxy_set_header test 'test header from nginx'; #receiving with request
        }
        autoindex on;
    }
}   