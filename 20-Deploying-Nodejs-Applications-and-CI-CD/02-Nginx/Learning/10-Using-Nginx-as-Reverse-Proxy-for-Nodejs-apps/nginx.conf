events {}

user raquib;

worker_processes auto;

http {
    server {
        listen 127.0.0.1:80;
        server_name local.com;
        location / {
            proxy_pass http://localhost:5173;
        }
    }
    server {
        listen 127.0.0.1:80;
        server_name api.local.com;
        location / {
            proxy_pass http://localhost:4000;
        }
    }
}