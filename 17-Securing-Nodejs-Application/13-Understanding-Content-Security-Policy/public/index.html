<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      img {
        width: 200px;
      }
    </style>
    <title>Social App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/script.js" type="module"></script>
  </head>

  <body class="bg-gray-100 p-6">
    <div class="max-w-xl mx-auto">
      <h1 class="text-2xl font-bold mb-4">Simple Social Media</h1>
      <img
        src="https://images.unsplash.com/photo-1771385706186-52d203076e01?w=400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxM3x8fGVufDB8fHx8fA%3D%3D"
        alt=""
      />
      <form id="postForm" class="mb-4">
        <textarea
          id="content"
          class="w-full p-2 border rounded"
          rows="3"
          placeholder="Write your post..."
        ></textarea>
        <button
          class="mt-2 bg-blue-500 text-white px-4 py-2 rounded"
          type="submit"
        >
          Post
        </button>
      </form>
      <div id="posts"></div>
    </div>
  </body>
</html>
